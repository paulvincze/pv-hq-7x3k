/* ============================ THEME ============================ */
function makeTheme(settings) {
  const A = settings.accent || "#D8B45A";
  const glass = settings.glass !== false;
  const aDim = A + "26";
  return {
    A, aDim, glass,
    bg: glass ? "#0A0E18" : "#0B0F19",
    text: "#EEF1F7", mut: "#9AA3B5", faint: "#6B7488",
    line: glass ? "rgba(255,255,255,0.09)" : "#1E2638",
    panel: glass ? "rgba(255,255,255,0.045)" : "#121826",
    panel2: glass ? "rgba(255,255,255,0.025)" : "#0F1420",
    panelSolid: "#121826",
    green: "#54C08A", greenDim: "rgba(84,192,138,0.16)",
    red: "#E0726B", redDim: "rgba(224,114,107,0.16)",
    amber: "#E0A94A", amberDim: "rgba(224,169,74,0.16)",
    blue: "#5B9BD5", purple: "#B985D8",
    blur: glass ? "saturate(150%) blur(22px)" : "none",
  };
}
const STATUS = (T) => ({
  Active: { c: T.green, b: T.greenDim }, Prospect: { c: T.amber, b: T.amberDim },
  Lead: { c: T.amber, b: T.amberDim }, Cooling: { c: T.red, b: T.redDim },
  Stalled: { c: T.red, b: T.redDim }, Cold: { c: T.mut, b: "rgba(255,255,255,.06)" }, Past: { c: T.mut, b: "rgba(255,255,255,.06)" },
});

let T = makeTheme(DEFAULT.settings); // set per-render in App

function Card({ children, style, glassStrength = "thin", accentBar, className = "" }) {
  const base = T.glass ? {
    background: glassStrength === "ultra" ? "rgba(255,255,255,0.03)" : glassStrength === "thick" ? "rgba(255,255,255,0.06)" : "rgba(255,255,255,0.045)",
    backdropFilter: T.blur, WebkitBackdropFilter: T.blur,
    border: `1px solid ${T.line}`, borderRadius: 20,
    boxShadow: "0 8px 32px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.07)",
  } : { background: T.panel, border: `1px solid ${T.line}`, borderRadius: 16 };
  return <div className={className} style={{ position: "relative", overflow: "hidden", ...base, ...style }}>
    {accentBar && <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 3, background: accentBar }} />}
    {children}
  </div>;
}
function Btn({ children, onClick, variant = "solid", size = "md", style, title }) {
  const base = { border: "1px solid transparent", borderRadius: 12, cursor: "pointer", fontWeight: 600, display: "inline-flex", alignItems: "center", gap: 6, transition: "all .15s", fontFamily: "inherit", whiteSpace: "nowrap", minHeight: size === "sm" ? 30 : 38 };
  const sizes = { sm: { padding: "5px 11px", fontSize: 12 }, md: { padding: "9px 15px", fontSize: 13 } };
  const variants = {
    solid: { background: T.A, color: "#15100333" === "" ? "#000" : "#171205", boxShadow: T.glass ? `0 4px 16px ${T.A}44` : "none" },
    ghost: { background: T.glass ? "rgba(255,255,255,0.06)" : T.panel2, color: T.text, border: `1px solid ${T.line}`, backdropFilter: T.blur, WebkitBackdropFilter: T.blur },
    danger: { background: "transparent", color: T.red, border: `1px solid ${T.red}44` },
    quiet: { background: "transparent", color: T.mut, border: `1px solid ${T.line}` },
  };
  return <button title={title} onClick={onClick} style={{ ...base, ...sizes[size], ...variants[variant], ...style }}>{children}</button>;
}
function IconBtn({ icon: Ic, onClick, title, color }) {
  return <button title={title} onClick={onClick} style={{ background: "transparent", border: "none", cursor: "pointer", color: color || T.mut, padding: 6, borderRadius: 9, display: "inline-flex", minWidth: 30, minHeight: 30, alignItems: "center", justifyContent: "center" }}><Ic size={16} /></button>;

function Input(props) { return <input {...props} style={{ ...inputStyle(), ...props.style }} />; }

  const incThis = s.income.filter((i) => monthKey(i.date) === tm).reduce((a, b) => a + (+b.amount || 0), 0);
  const incLast = s.income.filter((i) => monthKey(i.date) === lm).reduce((a, b) => a + (+b.amount || 0), 0);
  const expThis = s.expenses.filter((e) => monthKey(e.date) === tm).reduce((a, b) => a + (+b.amount || 0), 0);
  const profit = incThis - expThis;
  const recurring = s.clients.filter((c) => c.status === "Active" && c.arrangement === "Retainer").reduce((a, b) => a + (+b.monthly || 0), 0);
  const active = s.clients.filter((c) => c.status === "Active").length;
  const owed = s.pipeline.filter((p) => p.stage === "Won").reduce((a, b) => a + (+b.value || 0), 0);
  const goal = s.settings.goalRON || 1;
  const pctGoal = Math.round((incThis / goal) * 100);
  const [editMove, setEditMove] = useState(false);

  const trend = (() => { const m = {}; s.income.forEach((i) => { const k = monthKey(i.date); if (k) m[k] = (m[k] || 0) + (+i.amount || 0); }); const a = Object.keys(m).sort().slice(-6).map((k) => ({ name: niceMonth(k), RON: m[k] })); return a.length ? a : [{ name: niceMonth(tm), RON: 0 }]; })();
  const mix = (() => { const g = {}; s.clients.forEach((c) => { g[c.status] = (g[c.status] || 0) + 1; }); const ST = STATUS(T); return Object.entries(g).map(([k, v]) => ({ name: k, value: v, fill: (ST[k] || { c: T.mut }).c })); })();
  const toggleTask = (id) => set((d) => ({ ...d, tasks: d.tasks.map((t) => t.id === id ? { ...t, done: !t.done } : t) }));
  const addTask = (text) => set((d) => ({ ...d, tasks: [...d.tasks, { id: uid(), text, done: false, p: 2 }] }));

      <Stat label="Profit this month" value={`${ron(profit)}`} sub={`After ${ron(expThis)} expenses`} accent={profit >= 0 ? T.green : T.red} />
      <Stat label="Recurring / mo" value={`${ron(recurring)}`} sub="Active retainers" accent={T.green} />
      <Stat label="Active clients" value={active} sub={`${s.pipeline.filter(p => !["Won", "Paid", "Lost"].includes(p.stage)).length} in pipeline`} accent={T.blue} />
      <Stat label="Money owed" value={`${ron(owed)}`} sub="Won, not yet paid" accent={T.amber} />
    </div>

    <Card glassStrength="thick" style={{ padding: 20, marginBottom: 22, borderColor: T.A + "55" }}>
      <div style={{ display: "flex", gap: 16, alignItems: "center", flexWrap: "wrap" }}>
        <div style={{ width: 46, height: 46, borderRadius: 14, background: T.aDim, display: "grid", placeItems: "center", flexShrink: 0 }}><I_Flame size={24} color={T.A} /></div>
        <div style={{ flex: 1, minWidth: 220 }}>
          <div style={{ fontSize: 11, color: T.A, fontWeight: 700, letterSpacing: 1 }}>THE NEXT MOVE</div>
          {editMove ? <>
            <Input value={s.settings.nextMoveTitle} onChange={(e) => set((d) => ({ ...d, settings: { ...d.settings, nextMoveTitle: e.target.value } }))} style={{ marginTop: 6, marginBottom: 6 }} />
            <Textarea value={s.settings.nextMoveText} onChange={(e) => set((d) => ({ ...d, settings: { ...d.settings, nextMoveText: e.target.value } }))} />
          </> : <>
            <div style={{ fontSize: 16, color: T.text, fontWeight: 700, marginTop: 3 }}>{s.settings.nextMoveTitle}</div>
            <div style={{ fontSize: 12.5, color: T.mut, marginTop: 4 }}>{s.settings.nextMoveText}</div>
          </>}
        </div>
        <IconBtn icon={editMove ? I_Check : I_Pencil} onClick={() => setEditMove(!editMove)} title="Edit" color={editMove ? T.green : T.mut} />
      </div>
    </Card>

    <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 16, marginBottom: 22 }} className="hq-grid2">
      <Card style={{ padding: 20 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: T.text, marginBottom: 16 }}>Income — last 6 months</div>
        <div style={{ height: 220 }}><SvgBar data={trend} dataKey="RON" color={T.A} /></div>
      </Card>
      <Card style={{ padding: 20 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: T.text, marginBottom: 16 }}>Client status</div>
        <div style={{ height: 200 }}><SvgDonut data={mix} /></div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", marginTop: 10 }}>
          {mix.map((m, i) => <span key={i} style={{ fontSize: 11, color: T.mut, display: "flex", alignItems: "center", gap: 4 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: m.fill }} />{m.name} {m.value}</span>)}
        </div>
      </Card>
    </div>

    <Card style={{ padding: 20 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: T.text }}>Action queue</div>
        <span style={{ fontSize: 11, color: T.mut }}>{s.tasks.filter((t) => !t.done).length} open</span>
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
        <Input value={newTask} onChange={(e) => setNewTask(e.target.value)} placeholder="Add a task…" onKeyDown={(e) => { if (e.key === "Enter" && newTask.trim()) { addTask(newTask.trim()); setNewTask(""); } }} />
        <Btn onClick={() => { if (newTask.trim()) { addTask(newTask.trim()); setNewTask(""); } }}><I_Plus size={15} /></Btn>
      </div>
      <div>
        {s.tasks.map((t) => <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 11, padding: "10px 8px", borderRadius: 10, opacity: t.done ? .45 : 1 }} className="hq-row">
          <span onClick={() => toggleTask(t.id)} style={{ cursor: "pointer", display: "flex" }}>{t.done ? <I_CheckCircle2 size={18} color={T.green} /> : <I_Circle size={18} color={T.mut} />}</span>
          <span onClick={() => toggleTask(t.id)} style={{ fontSize: 13.5, color: T.text, textDecoration: t.done ? "line-through" : "none", flex: 1, cursor: "pointer" }}>{t.text}</span>
          <Badge c={t.p === 1 ? T.red : t.p === 2 ? T.amber : T.mut} b={t.p === 1 ? T.redDim : t.p === 2 ? T.amberDim : "rgba(255,255,255,.06)"}>{t.p === 1 ? "NOW" : t.p === 2 ? "THIS WEEK" : "ONGOING"}</Badge>
          <IconBtn icon={I_Trash2} onClick={() => delTask(t.id)} title="Delete" color={T.faint} />
        </div>)}
      </div>
    </Card>
  </div>;
}

/* ---------------- Pipeline (with Won → Paid → auto-income) ---------------- */
function Pipeline({ s, set }) {
  const stages = ["Lead", "Contacted", "Negotiating", "Won", "Paid"];
  const stageColor = { Lead: T.mut, Contacted: T.blue, Negotiating: T.amber, Won: T.green, Paid: T.A, Lost: T.red };
  const [edit, setEdit] = useState(null);
  const blank = { id: "", name: "", source: "", want: "", value: 0, stage: "Lead", next: "", notes: "", invoiced: false };
  const save = (l) => { set((d) => l.id ? { ...d, pipeline: d.pipeline.map((x) => x.id === l.id ? l : x) } : { ...d, pipeline: [{ ...l, id: uid() }, ...d.pipeline] }); setEdit(null); };
  const del = (id) => set((d) => ({ ...d, pipeline: d.pipeline.filter((x) => x.id !== id) }));

  // moving to "Paid" auto-creates one income entry (idempotent via invoiced flag)
  const setStage = (id, stage) => set((d) => {
    let income = d.pipeline_addedIncome ? d.income : d.income;
    const pipeline = d.pipeline.map((x) => {
      if (x.id !== id) return x;
      const upd = { ...x, stage };
      if (stage === "Paid" && !x.invoiced) {
        upd.invoiced = true;
        income = [{ id: uid(), client: x.name.replace(/ retainer$/i, ""), what: x.want || "Closed deal", date: today(), amount: +x.value || 0, method: "Auto (pipeline)", fromPipeline: x.id }, ...income];
      }
      return upd;
    });
    return { ...d, pipeline, income };
  });
  const move = (id, dir) => { const cur = s.pipeline.find((p) => p.id === id); const i = stages.indexOf(cur.stage); const ni = Math.max(0, Math.min(stages.length - 1, i + dir)); setStage(id, stages[ni]); };
  const markLost = (id) => setStage(id, "Lost");

  const allStages = [...stages, "Lost"];
  return <Section title="Pipeline" sub="Move leads toward the close. When a deal hits Paid, it logs to Income automatically." right={<Btn onClick={() => setEdit(blank)}><I_Plus size={15} /> Add lead</Btn>}>
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(210px,1fr))", gap: 12 }}>
      {allStages.map((st) => { const items = s.pipeline.filter((p) => p.stage === st); return <div key={st} style={{ background: T.glass ? "rgba(255,255,255,.025)" : T.panel2, border: `1px solid ${T.line}`, borderRadius: 16, padding: 12, minHeight: 120 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}><span style={{ fontSize: 12, fontWeight: 700, color: stageColor[st] }}>{st}</span><span style={{ fontSize: 11, color: T.mut }}>{items.length}</span></div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {items.map((l) => <Card key={l.id} glassStrength="ultra" style={{ padding: 12, borderRadius: 14 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: T.text, marginBottom: 3 }}>{l.name}</div>
            <div style={{ fontSize: 11, color: T.mut, marginBottom: 6 }}>{l.want}</div>
            {+l.value > 0 && <div style={{ fontSize: 11.5, color: T.A, fontWeight: 700, marginBottom: 6 }}>{ron(l.value)} {s.settings.currency}</div>}
            {l.stage === "Paid" && l.invoiced && <div style={{ fontSize: 10.5, color: T.green, marginBottom: 6 }}>✓ Logged to income</div>}
            {l.next && l.stage !== "Paid" && l.stage !== "Lost" && <div style={{ fontSize: 11, color: T.mut, fontStyle: "italic", marginBottom: 8 }}>Next: {l.next}</div>}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ display: "flex", gap: 2 }}><IconBtn icon={I_Pencil} onClick={() => setEdit(l)} title="Edit" /><IconBtn icon={I_Trash2} onClick={() => del(l.id)} title="Delete" color={T.red} /></div>
              <div style={{ display: "flex", gap: 3 }}>
                {l.stage !== "Lost" && <button onClick={() => move(l.id, -1)} title="Back" style={{ background: "transparent", border: `1px solid ${T.line}`, borderRadius: 7, color: T.mut, cursor: "pointer", padding: "3px 7px", fontSize: 11 }}>←</button>}
                {l.stage !== "Lost" && l.stage !== "Paid" && <button onClick={() => move(l.id, 1)} title="Advance" style={{ background: T.aDim, border: `1px solid ${T.A}55`, borderRadius: 7, color: T.A, cursor: "pointer", padding: "3px 7px", fontSize: 11 }}>→</button>}
                {l.stage !== "Lost" && l.stage !== "Paid" && <button onClick={() => markLost(l.id)} title="Mark lost" style={{ background: "transparent", border: `1px solid ${T.red}44`, borderRadius: 7, color: T.red, cursor: "pointer", padding: "3px 7px", fontSize: 11 }}>✕</button>}
              </div>
            </div>
          </Card>)}
        </div>
      </div>; })}
    </div>
    {edit && <PipelineModal init={edit} onClose={() => setEdit(null)} onSave={save} stages={allStages} />}
  </Section>;
}
function PipelineModal({ init, onClose, onSave, stages }) {
  const [f, setF] = useState(init); const u = (k, v) => setF((p) => ({ ...p, [k]: v }));
  return <Modal open onClose={onClose} title={init.id ? "Edit lead" : "Add lead"}>
    <Field label="Name"><Input value={f.name} onChange={(e) => u("name", e.target.value)} /></Field>
    <Field label="Source"><Input value={f.source} onChange={(e) => u("source", e.target.value)} /></Field>
    <Field label="What they want"><Input value={f.want} onChange={(e) => u("want", e.target.value)} /></Field>
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
      <Field label="Est. value"><Input type="number" value={f.value} onChange={(e) => u("value", e.target.value)} /></Field>
      <Field label="Stage"><Select value={f.stage} onChange={(e) => u("stage", e.target.value)} options={stages} /></Field>
    </div>
    <Field label="Next step"><Input value={f.next} onChange={(e) => u("next", e.target.value)} /></Field>
    <Field label="Notes"><Textarea value={f.notes} onChange={(e) => u("notes", e.target.value)} /></Field>
    <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}><Btn variant="ghost" onClick={onClose}>Cancel</Btn><Btn onClick={() => f.name && onSave(f)}><I_Check size={15} /> Save</Btn></div>
  </Modal>;
}

/* ---------------- Income ---------------- */
function Income({ s, set }) {
  const [edit, setEdit] = useState(null);
  const blank = { id: "", client: "", what: "", date: today(), amount: "", method: "Cash" };
  const save = (e) => { set((d) => e.id ? { ...d, income: d.income.map((x) => x.id === e.id ? e : x) } : { ...d, income: [{ ...e, id: uid() }, ...d.income] }); setEdit(null); };
  const del = (id) => set((d) => ({ ...d, income: d.income.filter((x) => x.id !== id) }));
  const sorted = [...s.income].sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  const total = s.income.reduce((a, b) => a + (+b.amount || 0), 0);

  const lm = s.income.filter((i) => monthKey(i.date) === lastMonth()).reduce((a, b) => a + (+b.amount || 0), 0);
  const trend = (() => { const m = {}; s.income.forEach((i) => { const k = monthKey(i.date); if (k) m[k] = (m[k] || 0) + (+i.amount || 0); }); return Object.keys(m).sort().slice(-8).map((k) => ({ name: niceMonth(k), RON: m[k] })); })();
  const cur = s.settings.currency;
  return <Section title="Income" sub="Logs from the pipeline automatically when a deal is Paid. You can also add any payment manually." right={<Btn onClick={() => setEdit(blank)}><I_Plus size={15} /> Log payment</Btn>}>

    <Card style={{ padding: 0 }}>
      {sorted.length === 0 ? <Empty icon={I_Wallet} text="No payments yet. Close a deal in Pipeline (mark it Paid) or log one manually." /> : <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <thead><tr style={{ background: T.glass ? "rgba(255,255,255,.03)" : T.panel2 }}>{["Date", "Client", "For", "Amount", "Method", ""].map((h) => <th key={h} style={{ textAlign: h === "Amount" ? "right" : "left", padding: "12px 14px", color: T.mut, fontSize: 11, fontWeight: 700, borderBottom: `1px solid ${T.line}` }}>{h}</th>)}</tr></thead>
          <tbody>{sorted.map((i) => <tr key={i.id} style={{ borderBottom: `1px solid ${T.line}` }}>
            <td style={{ padding: "11px 14px", color: T.mut }}>{i.date}</td>
            <td style={{ padding: "11px 14px", color: T.text, fontWeight: 600 }}>{i.client}</td>
            <td style={{ padding: "11px 14px", color: T.mut }}>{i.what}</td>
            <td style={{ padding: "11px 14px", color: T.A, fontWeight: 700, textAlign: "right" }}>{ron(i.amount)} {cur}</td>
            <td style={{ padding: "11px 14px", color: T.mut }}>{i.fromPipeline ? <Badge c={T.green} b={T.greenDim}>Auto</Badge> : i.method}</td>
            <td style={{ padding: "11px 14px", textAlign: "right" }}><IconBtn icon={I_Pencil} onClick={() => setEdit(i)} title="Edit" /><IconBtn icon={I_Trash2} onClick={() => del(i.id)} title="Delete" color={T.red} /></td>
          </tr>)}</tbody>
        </table>
      </div>}
    </Card>
    {edit && <IncomeModal init={edit} onClose={() => setEdit(null)} onSave={save} clients={s.clients} />}
  </Section>;

      <div style={{ fontSize: 13, fontWeight: 700, color: T.text, marginBottom: 16 }}>Appearance</div>
      <Field label="Accent color"><ColorPicker value={s.settings.accent} onChange={(v) => upS("accent", v)} /></Field>
      <label style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 8, cursor: "pointer" }}><input type="checkbox" checked={s.settings.glass !== false} onChange={(e) => upS("glass", e.target.checked)} /><span style={{ fontSize: 13, color: T.text }}>Liquid Glass theme (frosted, translucent). Uncheck for solid dark.</span></label>
    </Card>
    <Card style={{ padding: 20, marginBottom: 16 }}>
      <div style={{ fontSize: 13, fontWeight: 700, color: T.text, marginBottom: 16 }}>Targets & currency</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(170px,1fr))", gap: 14 }}>
        <Field label="Your name"><Input value={s.settings.name} onChange={(e) => upS("name", e.target.value)} /></Field>
        <Field label="Currency label"><Input value={s.settings.currency} onChange={(e) => upS("currency", e.target.value)} /></Field>
        <Field label="Monthly income goal"><Input type="number" value={s.settings.goalRON} onChange={(e) => upS("goalRON", +e.target.value)} /></Field>
        <Field label="Instagram goal"><Input type="number" value={s.settings.igGoal} onChange={(e) => upS("igGoal", +e.target.value)} /></Field>
        <Field label="YouTube goal"><Input type="number" value={s.settings.ytGoal} onChange={(e) => upS("ytGoal", +e.target.value)} /></Field>
      </div>
    </Card>
    <Card style={{ padding: 20, marginBottom: 16 }}>
      <div style={{ fontSize: 13, fontWeight: 700, color: T.text, marginBottom: 6 }}>Menu labels & icons</div>
      <div style={{ fontSize: 12, color: T.mut, marginBottom: 14 }}>Rename any page or change its icon. (The page itself stays the same.)</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(220px,1fr))", gap: 10 }}>
        {s.nav.map((n, i) => <div key={n.key} style={{ display: "flex", alignItems: "center", gap: 8, background: T.glass ? "rgba(255,255,255,.03)" : T.panel2, padding: 8, borderRadius: 12, border: `1px solid ${T.line}` }}>
          <button onClick={() => setNavEdit(navEdit === i ? null : i)} style={{ width: 34, height: 34, borderRadius: 9, background: T.aDim, border: "none", display: "grid", placeItems: "center", cursor: "pointer", flexShrink: 0 }}><Icon name={n.icon} size={16} color={T.A} /></button>
          <Input value={n.label} onChange={(e) => upNav(i, "label", e.target.value)} />
        </div>)}
      </div>
      {navEdit != null && <div style={{ marginTop: 12 }}><div style={{ fontSize: 11, color: T.mut, marginBottom: 6 }}>Pick an icon for "{s.nav[navEdit].label}"</div><IconPicker value={s.nav[navEdit].icon} onChange={(v) => { upNav(navEdit, "icon", v); }} /></div>}
    </Card>
    <Card style={{ padding: 20, marginBottom: 16 }}>
      <div style={{ fontSize: 13, fontWeight: 700, color: T.text, marginBottom: 6 }}>Backup & restore</div>
      <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 14, lineHeight: 1.5 }}>Your data saves automatically on this computer. Export a backup now and then so you always own a copy. Updates keep your data automatically.</div>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}><Btn onClick={exp}><I_Download size={15} /> Export backup</Btn><Btn variant="ghost" onClick={() => fileRef.current?.click()}><I_Upload size={15} /> Restore from file</Btn><input ref={fileRef} type="file" accept="application/json" onChange={imp} style={{ display: "none" }} /></div>
    </Card>
    <Card style={{ padding: 20, borderColor: T.red + "44" }}>
      <div style={{ fontSize: 13, fontWeight: 700, color: T.red, marginBottom: 6 }}>Reset</div>
      <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 14 }}>Wipes everything and restores the original seeded HQ. Export a backup first if you might want your data back.</div>
      <Btn variant="danger" onClick={() => { if (confirm("Reset the entire HQ to defaults? This can't be undone.")) reset(); }}><I_RotateCcw size={15} /> Reset to defaults</Btn>
    </Card>
  </Section>;
}

/* ============================ SHELL ============================ */
const PAGES = { dash: Dashboard, clients: Clients, pipeline: Pipeline, income: Income, expenses: Expenses, pricing: Pricing, content: Content, growth: Growth, goals: Goals, playbook: Playbook, sky: Skyscraper, data: DataPage };

function App() {
  const [state, setState] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [page, setPage] = useState("dash");
  const [navOpen, setNavOpen] = useState(false);
  const [saved, setSaved] = useState(false);

  useEffect(() => { let alive = true; (async () => { try { const res = await store.get(KEY); if (alive) setState(res && res.value ? migrate(JSON.parse(res.value), DEFAULT) : JSON.parse(JSON.stringify(DEFAULT))); } catch { if (alive) setState(JSON.parse(JSON.stringify(DEFAULT))); } finally { if (alive) setLoaded(true); } })(); return () => { alive = false; }; }, []);
  useEffect(() => { if (!loaded || state == null) return; const t = setTimeout(async () => { try { await store.set(KEY, JSON.stringify(state)); setSaved(true); setTimeout(() => setSaved(false), 1200); } catch {} }, 450); return () => clearTimeout(t); }, [state, loaded]);

  const set = (fn) => setState((d) => fn(d));
  const reset = () => { const fresh = JSON.parse(JSON.stringify(DEFAULT)); fresh.clients = fresh.clients.map((c) => ({ ...c, id: uid() })); setState(fresh); };

  if (!loaded || !state) { T = makeTheme(DEFAULT.settings); return <div style={{ height: "100vh", background: T.bg, display: "grid", placeItems: "center", color: T.mut, fontFamily: "system-ui" }}><div style={{ textAlign: "center" }}><I_Building2 size={30} color={T.A} style={{ marginBottom: 10 }} /><div style={{ fontSize: 13 }}>Opening your HQ…</div></div></div>; }

  T = makeTheme(state.settings);
  const Page = PAGES[page] || Dashboard;
  const cur = state.nav.find((n) => n.key === page) || { label: "", icon: "dashboard" };

  return <div style={{ display: "flex", minHeight: "100vh", color: T.text, fontFamily: "-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif", position: "relative" }}>
    {/* ambient background */}
    <div style={{ position: "fixed", inset: 0, zIndex: -2, background: T.glass ? `radial-gradient(1100px 700px at 12% -8%, ${T.A}1A, transparent 60%), radial-gradient(900px 600px at 100% 0%, ${T.blue}14, transparent 55%), radial-gradient(800px 800px at 50% 120%, ${T.purple}12, transparent 60%), #080B12` : T.bg }} />
    <style>{`
      * { box-sizing: border-box; }
      ::-webkit-scrollbar { width: 9px; height: 9px; }
      ::-webkit-scrollbar-thumb { background: ${T.line}; border-radius: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      input[type=range]{ height: 5px; }
      input::placeholder, textarea::placeholder { color: ${T.faint}; }
      .hq-row:hover { background: ${T.glass ? "rgba(255,255,255,.04)" : T.panel2}; }
      @media (min-width: 720px){ .hq-show-md { display: inline !important; } }
      @media (max-width: 860px){ .hq-grid2 { grid-template-columns: 1fr !important; } .hq-sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 40; transform: translateX(-100%); transition: transform .25s; } .hq-sidebar.open { transform: translateX(0); } .hq-burger { display: inline-flex !important; } .hq-main { width: 100% !important; } }
    `}</style>

    <div className={`hq-sidebar ${navOpen ? "open" : ""}`} style={{ width: 244, flexShrink: 0, background: T.glass ? "rgba(12,16,26,0.6)" : "#0F1420", backdropFilter: T.blur, WebkitBackdropFilter: T.blur, borderRight: `1px solid ${T.line}`, display: "flex", flexDirection: "column", padding: "20px 12px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 11, padding: "4px 8px 20px" }}>
        <div style={{ width: 36, height: 36, borderRadius: 11, background: `linear-gradient(135deg, ${T.A}, ${T.A}99)`, display: "grid", placeItems: "center", flexShrink: 0, boxShadow: T.glass ? `0 4px 14px ${T.A}55` : "none" }}><I_Building2 size={20} color="#171205" /></div>
        <div style={{ lineHeight: 1.1 }}><div style={{ fontSize: 14.5, fontWeight: 800, color: T.text, letterSpacing: -.2 }}>Business HQ</div><div style={{ fontSize: 10.5, color: T.mut }}>{state.settings.name}</div></div>
      </div>
      <nav style={{ display: "flex", flexDirection: "column", gap: 2, flex: 1, overflowY: "auto" }}>
        {state.nav.map((n) => { const on = page === n.key; return <button key={n.key} onClick={() => { setPage(n.key); setNavOpen(false); }} style={{ display: "flex", alignItems: "center", gap: 11, padding: "11px 12px", borderRadius: 12, border: "none", cursor: "pointer", background: on ? T.aDim : "transparent", color: on ? T.A : T.mut, fontSize: 13.5, fontWeight: 600, textAlign: "left", fontFamily: "inherit", transition: "all .12s" }}><Icon name={n.icon} size={17} /> {n.label}</button>; })}
      </nav>
      <div style={{ padding: "12px 10px 2px", borderTop: `1px solid ${T.line}`, fontSize: 10.5, color: T.mut, lineHeight: 1.5 }}>Build the skyscraper — one floor at a time.</div>
    </div>
    {navOpen && <div onClick={() => setNavOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.5)", zIndex: 35 }} />}

    <div className="hq-main" style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column" }}>
      <header style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 22px", borderBottom: `1px solid ${T.line}`, background: T.glass ? "rgba(10,14,24,0.5)" : "rgba(15,20,32,.6)", position: "sticky", top: 0, zIndex: 20, backdropFilter: T.blur, WebkitBackdropFilter: T.blur }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <button className="hq-burger" onClick={() => setNavOpen(true)} style={{ display: "none", background: "transparent", border: "none", color: T.text, cursor: "pointer" }}><I_Menu size={22} /></button>
          <h1 style={{ margin: 0, fontSize: 18, fontWeight: 800, color: T.text, letterSpacing: -.3, display: "flex", alignItems: "center", gap: 9 }}><Icon name={cur.icon} size={19} color={T.A} />{cur.label}</h1>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 11.5, color: saved ? T.green : T.mut, display: "flex", alignItems: "center", gap: 5, transition: "color .2s" }}>{saved ? <I_Check size={13} /> : <I_Wifi size={13} />}{saved ? "Saved" : "Live"}</span>
          <span style={{ fontSize: 11.5, color: T.mut, padding: "5px 11px", border: `1px solid ${T.line}`, borderRadius: 20 }}>{new Date().toLocaleString("en-US", { month: "long", year: "numeric" })}</span>
        </div>
      </header>
      <main style={{ padding: "26px 22px 70px", maxWidth: 1200, width: "100%", margin: "0 auto" }}>
        <Page s={state} set={set} reset={reset} />
      </main>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

  var b=document.getElementById('boot'); if(b) b.style.display='none';
} catch(err){
  var el=document.getElementById('err'); var bt=document.getElementById('boot');
  if(bt) bt.style.display='none';
  if(el){ el.style.display='block'; el.textContent='Something went wrong:\n\n'+(err.message||err)+'\n\n'+(err.stack||''); }
}
</script>
</body>
</html>
